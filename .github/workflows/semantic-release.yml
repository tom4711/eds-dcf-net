name: Semantic Release

env:
  COVERAGE_MIN_PERCENT: "95.0"

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.14.x'

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Install dependencies
        run: npm ci

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build
        env:
          CI: true
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Enforce coverage threshold
        shell: bash
        run: |
          coverage_file="$(find . -type f -name 'coverage.cobertura.xml' -print -quit)"
          if [[ -z "$coverage_file" ]]; then
            echo "No coverage.cobertura.xml found."
            exit 1
          fi

          line_rate="$(awk '
            /line-rate="/ {
              match($0, /line-rate="[^"]+"/)
              value = substr($0, RSTART + 11, RLENGTH - 12)
              print value
              exit
            }
          ' "$coverage_file")"
          if [[ -z "$line_rate" ]]; then
            echo "Could not read line-rate from $coverage_file"
            exit 1
          fi

          coverage_percent="$(awk "BEGIN { printf \"%.2f\", $line_rate * 100 }")"
          echo "Line coverage: ${coverage_percent}% (required: >= ${COVERAGE_MIN_PERCENT}%)"

          awk "BEGIN { exit !($coverage_percent >= $COVERAGE_MIN_PERCENT) }" || {
            echo "Coverage gate failed."
            exit 1
          }

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: true

      - name: Semantic Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_CREDENTIALS: x-access-token:${{ secrets.RELEASE_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          GIT_AUTHOR_NAME: semantic-release-bot
          GIT_AUTHOR_EMAIL: ${{ vars.SEMANTIC_RELEASE_BOT_EMAIL }}
          GIT_COMMITTER_NAME: semantic-release-bot
          GIT_COMMITTER_EMAIL: ${{ vars.SEMANTIC_RELEASE_BOT_EMAIL }}
        shell: bash
        run: |
          set -euo pipefail

          dry_run_log="$(mktemp)"
          FORCE_COLOR=0 npx semantic-release --dry-run >"$dry_run_log" 2>&1 || {
            cat "$dry_run_log"
            exit 1
          }

          next_version="$(sed -nE 's/.*The next release version is ([^[:space:]]+).*/\1/p' "$dry_run_log" | tail -n 1)"

          if [[ -n "$next_version" ]]; then
            next_tag="v${next_version}"
            if git rev-parse -q --verify "refs/tags/$next_tag" >/dev/null; then
              tag_sha="$(git rev-list -n 1 "$next_tag")"
              if ! git merge-base --is-ancestor "$tag_sha" HEAD; then
                echo "Skipping semantic-release: tag $next_tag exists outside current branch history at $tag_sha."
                echo "Likely stale protected prerelease tag after history rewrite."
                exit 0
              fi
            fi
          fi

          npx semantic-release
